name: onecitizen
description: OneCitizen BD - Government cards and services platform for Bangladesh citizens.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.7.0
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  google_mlkit_text_recognition: ^0.14.0
  intl: ^0.20.1
  go_router: ^14.6.2
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  path: ^1.9.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
